schema_version: 28
http:
  address: 0.0.0.0:3000
  session_ttl: 720h
users:
  - name: admin
    password: $2b$10$dummy_bcrypt_hash_here_for_testing
auth_attempts: 5
block_auth_min: 15
dns:
  bind_hosts:
    - 0.0.0.0
  port: 53
  upstream_dns:
    - https://dns10.quad9.net/dns-query
  bootstrap_dns:
    - 9.9.9.10
    - 149.112.112.10
  fallback_dns: []
  all_servers: false
  fastest_addr: false
  cache_size: 4194304
  cache_ttl_min: 0
  cache_ttl_max: 0
  filtering_enabled: true
  filters_update_interval: 24
  parental_enabled: false
  safebrowsing_enabled: false
  aaaa_disabled: false
  enable_dnssec: false
  upstream_mode: load_balance
  resolve_clients: true
  use_private_ptr_resolvers: true
  local_domain_name: lan
tls:
  enabled: false
  server_name: ''
  force_https: false
  port_https: 443
  port_dns_over_tls: 853
  port_dns_over_quic: 784
  certificate_chain: ''
  private_key: ''
filters:
  - id: 1
    enabled: true
    url: https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt
    name: AdGuard DNS filter
whitelist_filters: []
user_rules:
  - '||example.com^'
dhcp:
  enabled: false
  interface_name: ''
  local_domain_name: lan
statistics:
  enabled: true
  interval: 24h
  ignored: []
querylog:
  enabled: true
  size_mb: 100
  interval: 90d
  anonymize_client_ip: false
  ignored: []
log:
  enabled: true
  file: ''
  verbose: false
